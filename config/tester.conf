server {
    listen 127.0.0.1:8081;
    server_name tester;
    autoindex on;
    root /workspaces/webserver-42/YoupiBanane;

    location / {
        limit_except GET;
    }

    location *.bla {
        limit_except GET POST;
        CGI on;
        cgiPath .bla /workspaces/webserver-42/cgi_tester;
    }

    location /post_body {
        limit_except POST;
        client_max_body_size 100;
    }

    location /directory {
        index youpi.bad_extension;
        root /workspaces/webserver-42/YoupiBanane;
        limit_except GET POST;
        autoindex on;
    }
 
    error_page 404 /404.html;
}