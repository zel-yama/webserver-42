<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Session and Cookies</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 600px; margin: 0 auto; background: #f5f5f5; }
        h1 { color: #333; }
        .box { background: white; border: 1px solid #ddd; padding: 20px; margin: 15px 0; border-radius: 5px; }
        pre { background: #f9f9f9; padding: 15px; overflow-x: auto; border-left: 3px solid #4CAF50; }
    </style>
</head>
<body>
    <h1>Session & Cookies</h1>
    
    <div class="box">
        <pre id="cookiesList"></pre>
    </div>
    
    <script>
        function showCookies() {
            const cookies = document.cookie;
            const cookiesDisplay = cookies ? cookies : 'No cookies found';
            document.getElementById('cookiesList').textContent = cookiesDisplay;
        }

        window.addEventListener('load', showCookies);
    </script>
</body>
</html>
